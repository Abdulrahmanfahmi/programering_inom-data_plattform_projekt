version: "3.9"

services:

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: zookeeper
    restart: always
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: kafka
    restart: always
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

  db:
    image: postgres:15
    container_name: riksdagen_db
    restart: always
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: riksdagen
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  producer_ledamoter:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    restart: always
    command: uv run python -u producers/ledamoter_producer.py
    depends_on:
      - kafka
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092

  producer_voteringar:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    restart: always
    command: uv run python -u producers/voteringar_producer.py
    depends_on:
      - kafka
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092

  producer_dokument:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    restart: always
    command: uv run python -u producers/dokument_producer.py
    depends_on:
      - kafka
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092

  producer_anforanden:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    restart: always
    command: uv run python -u producers/anforanden_producer.py
    depends_on:
      - kafka
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092

  producer_kalender:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    restart: always
    command: uv run python -u producers/kalender_producer.py
    depends_on:
      - kafka
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092

  consumer:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    restart: always
    command: uv run python -u consumers/consumer.py
    depends_on:
      - kafka
      - db
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      DATABASE_URL: postgresql://user:password@db:5432/riksdagen

  dashboard:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    restart: always
    command: uv run streamlit run app/dashboard.py --server.port=8501 --server.address=0.0.0.0
    ports:
      - "8501:8501"
    depends_on:
      - db
    environment:
      DATABASE_URL: postgresql://user:password@db:5432/riksdagen

volumes:
  postgres_data: